# Fly.io 部署配置。首次：安装 flyctl → `fly launch --copy-config --no-deploy` → `fly deploy`。
# app 名改成你自己的（全局唯一）。
app = "ra2web"
primary_region = "hkg"  # 香港，按你和朋友的位置改（nrt=东京 sin=新加坡 lax=洛杉矶 等）

[build]
  dockerfile = "Dockerfile"

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = "stop"
  auto_start_machines = true
  min_machines_running = 0

  [[http_service.checks]]
    interval = "15s"
    timeout = "2s"
    grace_period = "5s"
    method = "GET"
    path = "/health"

[[vm]]
  size = "shared-cpu-1x"
  memory = "256mb"
