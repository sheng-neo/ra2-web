<!doctype html>
<html lang="zh">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<title>单位美术风格样板 · 挑一个</title>
<style>
  html,body{margin:0;background:#0b0f13;color:#d8e0e6;font:15px/1.5 system-ui,'PingFang SC',sans-serif}
  .wrap{max-width:560px;margin:0 auto;padding:16px}
  h1{font-size:19px;font-weight:600;margin:6px 0 2px}
  .sub{color:#8aa0ad;font-size:13px;margin-bottom:14px}
  .row{background:#121821;border:1px solid #20303c;border-radius:12px;padding:12px 10px;margin:12px 0}
  .row h2{font-size:16px;margin:0 0 2px;font-weight:600}
  .row .tag{color:#8aa0ad;font-size:12.5px;margin:0 0 8px}
  .row.pick{border-color:#3a7fd0;box-shadow:0 0 0 1px #3a7fd0}
  .badge{display:inline-block;background:#2d6fb0;color:#fff;font-size:11px;border-radius:10px;padding:1px 8px;margin-left:6px;vertical-align:middle}
  svg{display:block;width:100%;height:auto}
  .cols{color:#7a8a96;font-size:12px;display:flex;justify-content:space-around;margin-top:4px}
  .foot{color:#8aa0ad;font-size:13px;margin-top:16px;text-align:center}
</style>
</head>
<body>
<div class="wrap">
  <h1>单位美术风格样板</h1>
  <div class="sub">同一组单位（坦克 / 步兵 / 电厂）三种画风，挑一个回去告诉我（A / B / C）。</div>

  <div class="row">
    <h2>A · 简约扁平</h2>
    <div class="tag">干净几何 + 阵营色，现代手游感，最快最稳</div>
    <svg viewBox="0 0 480 150" xmlns="http://www.w3.org/2000/svg">
      <g transform="translate(95,90)">
        <ellipse cx="0" cy="14" rx="20" ry="6" fill="#000" opacity="0.18"/>
        <rect x="-20" y="-16" width="40" height="28" rx="7" fill="#5a8fd0"/>
        <circle cx="0" cy="-2" r="10" fill="#3a6fb0"/>
        <rect x="2" y="-5" width="22" height="6" rx="3" fill="#2a466e"/>
      </g>
      <g transform="translate(240,90)">
        <ellipse cx="0" cy="14" rx="9" ry="3" fill="#000" opacity="0.18"/>
        <rect x="-7" y="-10" width="14" height="22" rx="7" fill="#5a8fd0"/>
        <circle cx="0" cy="-16" r="7" fill="#e0c9a8"/>
      </g>
      <g transform="translate(385,90)">
        <ellipse cx="0" cy="16" rx="30" ry="7" fill="#000" opacity="0.18"/>
        <rect x="-30" y="-22" width="60" height="40" rx="6" fill="#7a8694"/>
        <rect x="6" y="-40" width="16" height="20" rx="3" fill="#5c6672"/>
      </g>
    </svg>
  </div>

  <div class="row pick">
    <h2>B · 等距精细 <span class="badge">我推荐</span></h2>
    <div class="tag">描边 + 高光 + 三面阴影，最像经典 RTS 单位图，与体素坦克最搭</div>
    <svg viewBox="0 0 480 150" xmlns="http://www.w3.org/2000/svg">
      <g transform="translate(95,86)">
        <ellipse cx="0" cy="16" rx="22" ry="6" fill="#000" opacity="0.22"/>
        <polygon points="-24,6 -10,14 22,4 8,-4" fill="#33405a" stroke="#16203a" stroke-width="1.5"/>
        <polygon points="-22,-4 -8,4 20,-6 6,-14" fill="#4a7ec0" stroke="#16203a" stroke-width="1.5"/>
        <polygon points="-22,-4 -22,2 -8,10 -8,4" fill="#2f5a96" stroke="#16203a" stroke-width="1.5"/>
        <polygon points="-8,4 -8,10 20,0 20,-6" fill="#27518a" stroke="#16203a" stroke-width="1.5"/>
        <polygon points="-6,-10 2,-6 12,-10 4,-14" fill="#7aa8e0" stroke="#16203a" stroke-width="1.5"/>
        <rect x="4" y="-12" width="22" height="4.5" rx="2" fill="#1f3656" stroke="#16203a" stroke-width="1"/>
      </g>
      <g transform="translate(240,86)">
        <ellipse cx="0" cy="16" rx="9" ry="3" fill="#000" opacity="0.22"/>
        <path d="M-6,12 L-6,-2 Q-6,-9 0,-9 Q6,-9 6,-2 L6,12 Z" fill="#4a7ec0" stroke="#16203a" stroke-width="1.4"/>
        <path d="M-6,-2 Q0,-6 6,-2 L6,2 Q0,-2 -6,2 Z" fill="#6a98d4"/>
        <circle cx="0" cy="-15" r="7" fill="#e0c9a8" stroke="#16203a" stroke-width="1.4"/>
        <path d="M-7,-17 Q0,-24 7,-17 Z" fill="#3a6fb0" stroke="#16203a" stroke-width="1.2"/>
        <rect x="3" y="-4" width="14" height="3" rx="1.5" fill="#2a2f38" stroke="#16203a" stroke-width="0.8"/>
      </g>
      <g transform="translate(385,86)">
        <ellipse cx="0" cy="18" rx="32" ry="7" fill="#000" opacity="0.22"/>
        <polygon points="-30,8 0,22 30,8 0,-6" fill="#5a6470" stroke="#23282f" stroke-width="1.5"/>
        <polygon points="-30,8 -30,-10 0,-24 0,-6" fill="#7a8694" stroke="#23282f" stroke-width="1.5"/>
        <polygon points="0,-6 0,22 30,8 30,-10" fill="#454d57" stroke="#23282f" stroke-width="1.5"/>
        <circle cx="-16" cy="2" r="2.2" fill="#ffe48a"/><circle cx="-8" cy="6" r="2.2" fill="#ffe48a"/>
        <circle cx="12" cy="2" r="2.2" fill="#ffe48a"/>
      </g>
    </svg>
  </div>

  <div class="row">
    <h2>C · 军事写实</h2>
    <div class="tag">迷彩 + 厚重明暗，硬核战争感，最费工（与现有体素/卡通占位略割裂）</div>
    <svg viewBox="0 0 480 150" xmlns="http://www.w3.org/2000/svg">
      <g transform="translate(95,88)">
        <ellipse cx="0" cy="16" rx="23" ry="7" fill="#000" opacity="0.3"/>
        <polygon points="-24,6 -10,14 22,4 8,-4" fill="#2b2e1c" stroke="#15170c" stroke-width="1.5"/>
        <polygon points="-22,-4 -8,4 20,-6 6,-14" fill="#5b5f34" stroke="#15170c" stroke-width="1.5"/>
        <polygon points="-22,-4 -22,2 -8,10 -8,4" fill="#3d4022" stroke="#15170c" stroke-width="1.5"/>
        <polygon points="-8,4 -8,10 20,0 20,-6" fill="#34381e" stroke="#15170c" stroke-width="1.5"/>
        <ellipse cx="-12" cy="-7" rx="5" ry="3" fill="#3d4022"/><ellipse cx="6" cy="-9" rx="4" ry="2.5" fill="#6e7340"/>
        <polygon points="-6,-10 2,-6 12,-10 4,-14" fill="#6e7340" stroke="#15170c" stroke-width="1.5"/>
        <rect x="4" y="-12" width="24" height="5" rx="2" fill="#1c1e12" stroke="#15170c" stroke-width="1"/>
      </g>
      <g transform="translate(240,88)">
        <ellipse cx="0" cy="16" rx="9" ry="3" fill="#000" opacity="0.3"/>
        <path d="M-6,12 L-6,-2 Q-6,-9 0,-9 Q6,-9 6,-2 L6,12 Z" fill="#4a4d2a" stroke="#15170c" stroke-width="1.4"/>
        <ellipse cx="-2" cy="2" rx="3" ry="4" fill="#34381e"/><ellipse cx="3" cy="6" rx="2.5" ry="3" fill="#6e7340"/>
        <circle cx="0" cy="-15" r="7" fill="#b9a07e" stroke="#15170c" stroke-width="1.4"/>
        <path d="M-7,-16 Q0,-24 7,-16 Z" fill="#4a4d2a" stroke="#15170c" stroke-width="1.2"/>
        <rect x="3" y="-4" width="15" height="3" rx="1" fill="#1c1e12"/>
      </g>
      <g transform="translate(385,88)">
        <ellipse cx="0" cy="18" rx="33" ry="8" fill="#000" opacity="0.3"/>
        <polygon points="-30,8 0,22 30,8 0,-6" fill="#3a4038" stroke="#13160f" stroke-width="1.5"/>
        <polygon points="-30,8 -30,-10 0,-24 0,-6" fill="#5e6358" stroke="#13160f" stroke-width="1.5"/>
        <polygon points="0,-6 0,22 30,8 30,-10" fill="#2f342c" stroke="#13160f" stroke-width="1.5"/>
        <ellipse cx="-14" cy="-8" rx="6" ry="3" fill="#454b40"/><ellipse cx="-6" cy="2" rx="5" ry="3" fill="#6a7060"/>
        <ellipse cx="-12" cy="-30" rx="6" ry="4" fill="#5a5a5a" opacity="0.7"/>
        <circle cx="14" cy="2" r="2" fill="#ff8a3a"/>
      </g>
    </svg>
  </div>

  <div class="foot">看完回去告诉我 <b>A / B / C</b> 就行，我把选定风格铺到全部单位与建筑。</div>
</div>
</body>
</html>
